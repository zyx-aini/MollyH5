            <button id="btnReplay" class="btn-secondary">再来一次</button>
          </div>
        </div>
      </div>

      <div id="posterModal">
        <div class="poster-overlay"></div>
        <div class="poster-container">
          <canvas id="posterCanvas" width="750" height="1334"></canvas>
